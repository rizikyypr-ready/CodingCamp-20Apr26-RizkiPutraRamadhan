<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personal Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app-wrapper">

    <!-- Top bar: theme toggle -->
    <div id="top-bar">
      <button id="theme-toggle" aria-label="Switch to dark mode">🌙</button>
    </div>

    <!-- Greeting — full-width card -->
    <div id="greeting-card" class="card">
      <div id="greeting-time"></div>
      <div id="greeting-date"></div>
      <div id="greeting-phrase"></div>
      <div id="greeting-name-form">
        <input type="text" id="name-input" placeholder="Enter your name" aria-label="Your name" />
        <button id="name-save">Save</button>
        <span class="error" id="name-error" hidden></span>
      </div>
    </div>

    <!-- Middle row: Timer + Tasks -->
    <div id="middle-row">

      <!-- Focus Timer -->
      <section id="timer-widget" class="card">
        <h2>Focus Timer</h2>
        <div id="timer-display" aria-live="polite">25:00</div>
        <div id="timer-controls">
          <button id="timer-start-stop" aria-label="Start timer">Start</button>
          <button id="timer-reset" aria-label="Reset timer">Reset</button>
        </div>
        <div id="timer-duration-form">
          <label for="duration-input">Duration (min):</label>
          <input type="number" id="duration-input" min="1" max="120" value="25" aria-label="Pomodoro duration in minutes" />
          <button id="duration-save">Save</button>
          <span class="error" id="duration-error" hidden></span>
        </div>
      </section>

      <!-- Tasks -->
      <section id="todo-widget" class="card">
        <h2>Tasks</h2>
        <div id="todo-add-form">
          <input type="text" id="todo-input" placeholder="Add a new task..." aria-label="New task label" />
          <button id="todo-add">Add</button>
          <span class="error" id="todo-error" hidden></span>
        </div>
        <ul id="todo-list" aria-label="Task list"></ul>
      </section>

    </div><!-- /#middle-row -->

    <!-- Quick Links — full-width card -->
    <section id="links-widget" class="card">
      <h2>Quick Links</h2>
      <div id="links-add-form">
        <input type="text" id="link-label-input" placeholder="Link name" aria-label="Link label" />
        <input type="url" id="link-url-input" placeholder="URL" aria-label="Link URL" />
        <button id="link-add">Add Link</button>
        <span class="error" id="links-error" hidden></span>
      </div>
      <div id="links-list" aria-label="Quick links"></div>
    </section>

  </div><!-- /#app-wrapper -->

  <script src="js/app.js"></script>
</body>
</html>
